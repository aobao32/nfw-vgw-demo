AWSTemplateFormatVersion: '2010-09-09'
Description: >
  以 VGW 为 DX 对接模式的 NFW 演示环境。云端检测 VPC（10.87.0.0/16）部署 VGW 与 NFW，
  并用一个独立 VPC（10.0.0.0/16，二级网段 10.132.0.0/16）模拟 IDC，二者通过 Site-to-Site VPN
  和 BGP 协议互联并开启路由传播。模拟 IDC 内运行 strongSwan + FRR 的 EC2 充当客户网关（CGW），
  对外通告 10.0.0.0/8 以及被检测子网 10.132.66.0/24。检测 VPC 指向 IDC 网段的路由刻意留空，
  便于操作者对比 BGP 自动传播与指向 NFW Endpoint 的静态最长前缀路由两种方式的效果。

Parameters:
  KeyPairName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: Existing EC2 key pair for SSH access to all EC2 instances

  LatestUbuntuArmAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/noble/stable/current/arm64/hvm/ebs-gp3/ami-id'
    Description: Latest Ubuntu 24.04 ARM64 AMI (used for workload EC2 and strongSwan/FRR gateway)

  Tunnel1PreSharedKey:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: '^[A-Za-z0-9._]+$'
    Default: 'Nfw2026Tunnel1Psk_changeme'
    Description: Pre-shared key for VPN tunnel 1 (8-64 chars, alnum and . _ only)

  Tunnel2PreSharedKey:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: '^[A-Za-z0-9._]+$'
    Default: 'Nfw2026Tunnel2Psk_changeme'
    Description: Pre-shared key for VPN tunnel 2 (8-64 chars, alnum and . _ only)

  CustomerBgpAsn:
    Type: Number
    Default: 65000
    Description: Private BGP ASN used by the simulated on-prem strongSwan/FRR gateway

  AwsVgwBgpAsn:
    Type: Number
    Default: 64512
    Description: BGP ASN advertised by the AWS Virtual Private Gateway

Mappings:
  Cidr:
    InspectionVpc:
      Vpc:                  '10.87.0.0/16'
      PrivateSubnetAZ1:     '10.87.114.0/24'
      PrivateSubnetAZ2:     '10.87.113.0/24'
      FirewallSubnetAZ1:    '10.87.115.0/28'
      FirewallSubnetAZ2:    '10.87.115.16/28'
    OnPremVpc:
      Vpc:                  '10.0.0.0/16'
      VpcSecondary:         '10.132.0.0/16'
      PublicSubnet:         '10.0.1.0/24'
      PrivateSubnet:        '10.132.66.0/24'
      BgpAnnounce:          '10.0.0.0/8'
    Vpn:
      Tunnel1Inside:        '169.254.100.0/30'
      Tunnel2Inside:        '169.254.100.4/30'

Resources:

  # ============================================================
  # Inspection VPC (target of NFW inspection)
  # ============================================================
  InspectionVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !FindInMap [Cidr, InspectionVpc, Vpc]
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Inspection VPC

  PrivateSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref InspectionVPC
      CidrBlock: !FindInMap [Cidr, InspectionVpc, PrivateSubnetAZ1]
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Private subnet AZ1

  PrivateSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref InspectionVPC
      CidrBlock: !FindInMap [Cidr, InspectionVpc, PrivateSubnetAZ2]
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: Private subnet AZ2

  FirewallSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref InspectionVPC
      CidrBlock: !FindInMap [Cidr, InspectionVpc, FirewallSubnetAZ1]
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Firewall subnet AZ1

  FirewallSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref InspectionVPC
      CidrBlock: !FindInMap [Cidr, InspectionVpc, FirewallSubnetAZ2]
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: Firewall subnet AZ2

  # ============================================================
  # Virtual Private Gateway + VPN attachment
  # ============================================================
  VGW:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      AmazonSideAsn: !Ref AwsVgwBgpAsn
      Tags:
        - Key: Name
          Value: Inspection VGW

  VGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref InspectionVPC
      VpnGatewayId: !Ref VGW


  # ============================================================
  # Simulated on-prem VPC (acts as the IDC)
  # ============================================================
  OnPremVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !FindInMap [Cidr, OnPremVpc, Vpc]
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Simulated OnPrem VPC

  # Secondary CIDR (10.132.0.0/16) hosts the inspected subnet 10.132.66.0/24,
  # the specific prefix that operators steer through NFW with a static
  # longest-prefix route. The wider 10.0.0.0/8 is what BGP propagates.
  OnPremVPCSecondaryCidr:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref OnPremVPC
      CidrBlock: !FindInMap [Cidr, OnPremVpc, VpcSecondary]

  OnPremIGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: OnPrem IGW

  OnPremIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref OnPremVPC
      InternetGatewayId: !Ref OnPremIGW

  OnPremPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OnPremVPC
      CidrBlock: !FindInMap [Cidr, OnPremVpc, PublicSubnet]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: OnPrem public subnet (CGW host)

  OnPremPrivateSubnet:
    Type: AWS::EC2::Subnet
    DependsOn: OnPremVPCSecondaryCidr
    Properties:
      VpcId: !Ref OnPremVPC
      CidrBlock: !FindInMap [Cidr, OnPremVpc, PrivateSubnet]
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: OnPrem inspected subnet (10.132.66.0/24)

  OnPremPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref OnPremVPC
      Tags:
        - Key: Name
          Value: OnPrem public RT

  OnPremPublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: OnPremIGWAttachment
    Properties:
      RouteTableId: !Ref OnPremPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref OnPremIGW

  OnPremPublicRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref OnPremPublicSubnet
      RouteTableId: !Ref OnPremPublicRT

  OnPremPrivateRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref OnPremVPC
      Tags:
        - Key: Name
          Value: OnPrem private RT

  # Workload subnet reaches the inspection VPC by going through the strongSwan EC2.
  OnPremPrivateRouteToInspection:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref OnPremPrivateRT
      DestinationCidrBlock: !FindInMap [Cidr, InspectionVpc, Vpc]
      InstanceId: !Ref StrongSwanInstance

  # Default route: anything not in 10/8 (the BGP-announced range)
  # exits the IDC subnet via the strongSwan EC2, which SNATs to
  # its own EIP at the IGW edge. This gives the IDC workload
  # internet egress without standing up a real NAT gateway.
  OnPremPrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref OnPremPrivateRT
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref StrongSwanInstance

  OnPremPrivateRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref OnPremPrivateSubnet
      RouteTableId: !Ref OnPremPrivateRT

  # ============================================================
  # Elastic IP + dedicated ENI for the strongSwan gateway.
  # The EIP is associated to the ENI before the instance launches,
  # so user-data has internet on first boot.
  # ============================================================
  StrongSwanEIP:
    Type: AWS::EC2::EIP
    DependsOn: OnPremIGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: StrongSwan CGW EIP

  StrongSwanENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref OnPremPublicSubnet
      Description: StrongSwan CGW primary ENI
      SourceDestCheck: false
      GroupSet:
        - !Ref StrongSwanSG
      Tags:
        - Key: Name
          Value: StrongSwan CGW ENI

  StrongSwanEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt StrongSwanEIP.AllocationId
      NetworkInterfaceId: !Ref StrongSwanENI

  # ============================================================
  # Customer Gateway + Site-to-Site VPN
  # ============================================================
  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      Type: ipsec.1
      BgpAsn: !Ref CustomerBgpAsn
      IpAddress: !Ref StrongSwanEIP
      Tags:
        - Key: Name
          Value: Simulated OnPrem CGW

  VPNConnection:
    Type: AWS::EC2::VPNConnection
    DependsOn: VGWAttachment
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref CustomerGateway
      VpnGatewayId: !Ref VGW
      StaticRoutesOnly: false
      VpnTunnelOptionsSpecifications:
        - PreSharedKey: !Ref Tunnel1PreSharedKey
          TunnelInsideCidr: !FindInMap [Cidr, Vpn, Tunnel1Inside]
        - PreSharedKey: !Ref Tunnel2PreSharedKey
          TunnelInsideCidr: !FindInMap [Cidr, Vpn, Tunnel2Inside]
      Tags:
        - Key: Name
          Value: VGW S2S VPN (DX simulator)


  # ============================================================
  # Network Firewall - Stateful rule group (temporary allow-all for debug)
  # ============================================================
  NFWStatefulAllowAll:
    Type: AWS::NetworkFirewall::RuleGroup
    Properties:
      RuleGroupName: !Sub '${AWS::StackName}-allow-all-debug'
      Type: STATEFUL
      Capacity: 10
      Description: Temporary stateful rule group passing all traffic in either direction
      RuleGroup:
        RulesSource:
          StatefulRules:
            - Action: PASS
              Header:
                Protocol: IP
                Source: ANY
                SourcePort: ANY
                Destination: ANY
                DestinationPort: ANY
                Direction: ANY
              RuleOptions:
                - Keyword: 'sid'
                  Settings: ['1000001']
                - Keyword: 'rev'
                  Settings: ['1']
        StatefulRuleOptions:
          RuleOrder: STRICT_ORDER
      Tags:
        - Key: Name
          Value: Stateful allow-all debug rule group

  # ============================================================
  # Network Firewall - Stateful rule group (block IDC -> cloud EC2 HTTP/80)
  #
  # Drops TCP/80 traffic originating from the simulated IDC address
  # space (10.0.0.0/16 + 10.132.0.0/16) toward the cloud workload
  # subnets (PrivateSubnetAZ1/AZ2). Everything else is untouched and
  # falls through to the allow-all group below.
  #
  # In STRICT_ORDER the engine evaluates rule groups from the lowest
  # priority number up and stops at the first match. This group is
  # referenced at Priority 1 (see NFWPolicy), ahead of the allow-all
  # group at Priority 100, so port-80 flows are dropped first while
  # all other flows reach the pass-all rule.
  #
  # CIDRs are injected from the Cidr mapping via Fn::Sub so the rule
  # stays in sync with the subnet definitions.
  # ============================================================
  NFWStatefulBlockIdcHttp:
    Type: AWS::NetworkFirewall::RuleGroup
    Properties:
      RuleGroupName: !Sub '${AWS::StackName}-block-idc-http'
      Type: STATEFUL
      Capacity: 10
      Description: Drop TCP/80 from simulated IDC ranges to cloud EC2 subnets
      RuleGroup:
        RulesSource:
          RulesString: !Sub
            - 'drop tcp [${IdcCidr1},${IdcCidr2}] any -> [${CloudSubnetAZ1},${CloudSubnetAZ2}] 80 (msg:"Block IDC to cloud EC2 subnets HTTP port 80"; flow:to_server; sid:1000010; rev:1;)'
            - IdcCidr1: !FindInMap [Cidr, OnPremVpc, Vpc]
              IdcCidr2: !FindInMap [Cidr, OnPremVpc, VpcSecondary]
              CloudSubnetAZ1: !FindInMap [Cidr, InspectionVpc, PrivateSubnetAZ1]
              CloudSubnetAZ2: !FindInMap [Cidr, InspectionVpc, PrivateSubnetAZ2]
        StatefulRuleOptions:
          RuleOrder: STRICT_ORDER
      Tags:
        - Key: Name
          Value: Stateful block IDC HTTP rule group

  # ============================================================
  # Network Firewall - Firewall policy (strict order, default drop)
  # ============================================================
  NFWPolicy:
    Type: AWS::NetworkFirewall::FirewallPolicy
    Properties:
      FirewallPolicyName: !Sub '${AWS::StackName}-policy'
      Description: VGW-DX inspection policy, strict order, default drop, with debug allow-all
      FirewallPolicy:
        StatelessDefaultActions:
          - 'aws:forward_to_sfe'
        StatelessFragmentDefaultActions:
          - 'aws:forward_to_sfe'
        StatefulRuleGroupReferences:
          - ResourceArn: !Ref NFWStatefulBlockIdcHttp
            Priority: 1
          - ResourceArn: !Ref NFWStatefulAllowAll
            Priority: 100
        StatefulDefaultActions:
          - 'aws:drop_established'
        StatefulEngineOptions:
          RuleOrder: STRICT_ORDER
          StreamExceptionPolicy: DROP
      Tags:
        - Key: Name
          Value: NFW VGW-DX policy

  # ============================================================
  # Network Firewall - Firewall
  # ============================================================
  NFWFirewall:
    Type: AWS::NetworkFirewall::Firewall
    Properties:
      FirewallName: !Sub '${AWS::StackName}-firewall'
      FirewallPolicyArn: !Ref NFWPolicy
      VpcId: !Ref InspectionVPC
      SubnetMappings:
        - SubnetId: !Ref FirewallSubnetAZ1
        - SubnetId: !Ref FirewallSubnetAZ2
      # 开启流量分析模式（Traffic analysis mode），采集 HTTP/HTTPS 指标用于生成流量分析报表。
      # 该模式仅在现有检测之上附加指标采集，不改变规则的放行/拦截行为。
      # TLS_SNI 对应 HTTPS 报表，HTTP_HOST 对应 HTTP 报表。
      EnabledAnalysisTypes:
        - TLS_SNI
        - HTTP_HOST
      DeleteProtection: false
      SubnetChangeProtection: false
      FirewallPolicyChangeProtection: false
      Description: NFW inspecting VPC <-> simulated DX traffic
      Tags:
        - Key: Name
          Value: Inspection NFW

  # ============================================================
  # Network Firewall - CloudWatch log groups
  #
  # Two log types are wired up: FLOW (every connection) and
  # ALERT (only flows that hit a stateful rule with action
  # alert/drop/reject). Both groups are stack-managed so they
  # get torn down with the stack.
  # ============================================================
  NFWFlowLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/network-firewall/${AWS::StackName}/flow'
      RetentionInDays: 14

  NFWAlertLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/aws/network-firewall/${AWS::StackName}/alert'
      RetentionInDays: 14

  # ============================================================
  # Network Firewall - Logging configuration
  #
  # Stack-managed so 'cloudformation delete-stack' tears the
  # logging binding down before deleting NFWFirewall, avoiding
  # 'Cannot delete firewall with a logging configuration'.
  # ============================================================
  NFWLoggingConfiguration:
    Type: AWS::NetworkFirewall::LoggingConfiguration
    Properties:
      FirewallArn: !Ref NFWFirewall
      LoggingConfiguration:
        LogDestinationConfigs:
          - LogType: FLOW
            LogDestinationType: CloudWatchLogs
            LogDestination:
              logGroup: !Ref NFWFlowLogGroup
          - LogType: ALERT
            LogDestinationType: CloudWatchLogs
            LogDestination:
              logGroup: !Ref NFWAlertLogGroup

  # ============================================================
  # Lambda IAM role - resolves NFW endpoint IDs and VPN tunnel info
  # ============================================================
  ResolverLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ResolverPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - network-firewall:DescribeFirewall
                  - ec2:DescribeVpnConnections
                  - ec2:DescribeRouteTables
                  - ec2:DeleteRoute
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                  - ec2:DescribeKeyPairs
                Resource: '*'

  # ============================================================
  # Lambda - Wait for NFW endpoints to be ready, return VPCE IDs per AZ
  # ============================================================
  NFWEndpointResolverLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-nfw-endpoint-resolver'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 600
      Role: !GetAtt ResolverLambdaRole.Arn
      Code:
        ZipFile: |
          import json, time, boto3, urllib3
          http = urllib3.PoolManager()
          def send(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See log stream {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              })
              http.request('PUT', event['ResponseURL'], body=body,
                           headers={'Content-Type': 'application/json'})
          def handler(event, context):
              print(json.dumps(event))
              if event['RequestType'] == 'Delete':
                  send(event, context, 'SUCCESS'); return
              try:
                  p = event['ResourceProperties']
                  name, az1, az2 = p['FirewallName'], p['AZ1'], p['AZ2']
                  c = boto3.client('network-firewall')
                  for i in range(60):
                      r = c.describe_firewall(FirewallName=name)
                      st = r.get('FirewallStatus', {})
                      sync = st.get('SyncStates', {})
                      print(f'attempt {i+1} status={st.get("Status")} azs={list(sync.keys())}')
                      if st.get('Status') == 'READY' and len(sync) >= 2:
                          e1 = sync.get(az1, {}).get('Attachment', {}).get('EndpointId')
                          e2 = sync.get(az2, {}).get('Attachment', {}).get('EndpointId')
                          if e1 and e2:
                              send(event, context, 'SUCCESS',
                                   {'EndpointIdAZ1': e1, 'EndpointIdAZ2': e2})
                              return
                      time.sleep(10)
                  send(event, context, 'FAILED', reason='Timed out waiting for NFW endpoints')
              except Exception as e:
                  print('error', e)
                  send(event, context, 'FAILED', reason=str(e))

  NFWEndpointResolver:
    Type: Custom::NFWEndpointResolver
    DependsOn: NFWFirewall
    Properties:
      ServiceToken: !GetAtt NFWEndpointResolverLambda.Arn
      FirewallName: !Sub '${AWS::StackName}-firewall'
      AZ1: !Select [0, !GetAZs '']
      AZ2: !Select [1, !GetAZs '']

  # ============================================================
  # Lambda - Resolve VPN tunnel parameters (outside IPs, inside CIDRs)
  # ============================================================
  VPNInfoResolverLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-vpn-info-resolver'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt ResolverLambdaRole.Arn
      Code:
        ZipFile: |
          import json, time, boto3, urllib3, xml.etree.ElementTree as ET
          http = urllib3.PoolManager()
          def send(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See log stream {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              })
              http.request('PUT', event['ResponseURL'], body=body,
                           headers={'Content-Type': 'application/json'})
          def handler(event, context):
              print(json.dumps(event))
              if event['RequestType'] == 'Delete':
                  send(event, context, 'SUCCESS'); return
              try:
                  vpn_id = event['ResourceProperties']['VpnConnectionId']
                  c = boto3.client('ec2')
                  for _ in range(30):
                      r = c.describe_vpn_connections(VpnConnectionIds=[vpn_id])
                      v = r['VpnConnections'][0]
                      cfg = v.get('CustomerGatewayConfiguration', '')
                      if cfg:
                          break
                      time.sleep(10)
                  if not cfg:
                      send(event, context, 'FAILED', reason='vpn config not ready'); return
                  root = ET.fromstring(cfg)
                  tunnels = root.findall('ipsec_tunnel')
                  out = {}
                  for idx, t in enumerate(tunnels[:2], start=1):
                      cgw = t.find('customer_gateway/tunnel_outside_address/ip_address').text
                      vgw = t.find('vpn_gateway/tunnel_outside_address/ip_address').text
                      cgw_in = t.find('customer_gateway/tunnel_inside_address/ip_address').text
                      cgw_inm = t.find('customer_gateway/tunnel_inside_address/network_mask').text
                      vgw_in = t.find('vpn_gateway/tunnel_inside_address/ip_address').text
                      psk = t.find('ike/pre_shared_key').text
                      vgw_asn = t.find('vpn_gateway/bgp/asn').text
                      cgw_asn = t.find('customer_gateway/bgp/asn').text
                      out[f'Tunnel{idx}OutsideCgw'] = cgw
                      out[f'Tunnel{idx}OutsideVgw'] = vgw
                      out[f'Tunnel{idx}InsideCgw'] = cgw_in
                      out[f'Tunnel{idx}InsideCgwMask'] = cgw_inm
                      out[f'Tunnel{idx}InsideVgw'] = vgw_in
                      out[f'Tunnel{idx}Psk'] = psk
                      out[f'Tunnel{idx}VgwAsn'] = vgw_asn
                      out[f'Tunnel{idx}CgwAsn'] = cgw_asn
                  print('resolved', {k: v for k, v in out.items() if 'Psk' not in k})
                  send(event, context, 'SUCCESS', out)
              except Exception as e:
                  print('error', e)
                  send(event, context, 'FAILED', reason=str(e))

  VPNInfoResolver:
    Type: Custom::VPNInfoResolver
    Properties:
      ServiceToken: !GetAtt VPNInfoResolverLambda.Arn
      VpnConnectionId: !Ref VPNConnection

  # ============================================================
  # Lambda - Route cleanup on stack delete
  #
  # Per the operator runbook, the user adds routes pointing at
  # the NFW VPC endpoints (vpce-id) into the private route
  # tables and the VGW ingress route table. CFN does not know
  # about those manual entries, so on 'delete-stack' the
  # firewall fails with 'related VPC endpoint(s) still exist
  # in route table(s)'. This custom resource scans every route
  # table in the inspection VPC at delete time and removes any
  # route whose target is the firewall's endpoint ids, before
  # CFN tries to delete NFWFirewall.
  # ============================================================
  RouteCleanupLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-route-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt ResolverLambdaRole.Arn
      Code:
        ZipFile: |
          import json, boto3, urllib3
          http = urllib3.PoolManager()
          def send(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See log stream {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              })
              http.request('PUT', event['ResponseURL'], body=body,
                           headers={'Content-Type': 'application/json'})
          def handler(event, context):
              print(json.dumps(event))
              # Only act on Delete; Create/Update is a no-op.
              if event['RequestType'] != 'Delete':
                  send(event, context, 'SUCCESS'); return
              try:
                  p = event['ResourceProperties']
                  vpc_id = p['VpcId']
                  endpoint_ids = set(filter(None, [p.get('EndpointIdAZ1'), p.get('EndpointIdAZ2')]))
                  c = boto3.client('ec2')
                  rts = c.describe_route_tables(
                      Filters=[{'Name': 'vpc-id', 'Values': [vpc_id]}]
                  )['RouteTables']
                  removed = 0
                  for rt in rts:
                      rtb_id = rt['RouteTableId']
                      for r in rt.get('Routes', []):
                          # NFW endpoints land in the route table as
                          # GatewayId starting with 'vpce-' or as
                          # VpcEndpointId, depending on API version.
                          target = r.get('GatewayId') or r.get('VpcEndpointId')
                          if not target or not target.startswith('vpce-'):
                              continue
                          if endpoint_ids and target not in endpoint_ids:
                              continue
                          dst = r.get('DestinationCidrBlock') or r.get('DestinationIpv6CidrBlock') or r.get('DestinationPrefixListId')
                          print(f'deleting route {dst} -> {target} from {rtb_id}')
                          kwargs = {'RouteTableId': rtb_id}
                          if r.get('DestinationCidrBlock'):
                              kwargs['DestinationCidrBlock'] = r['DestinationCidrBlock']
                          elif r.get('DestinationIpv6CidrBlock'):
                              kwargs['DestinationIpv6CidrBlock'] = r['DestinationIpv6CidrBlock']
                          elif r.get('DestinationPrefixListId'):
                              kwargs['DestinationPrefixListId'] = r['DestinationPrefixListId']
                          try:
                              c.delete_route(**kwargs)
                              removed += 1
                          except Exception as ex:
                              print(f'delete_route failed (continuing): {ex}')
                  print(f'removed {removed} NFW-endpoint routes')
                  send(event, context, 'SUCCESS', {'RemovedRoutes': removed})
              except Exception as e:
                  print('error', e)
                  # Never fail the stack delete on cleanup errors.
                  send(event, context, 'SUCCESS', reason=f'cleanup error ignored: {e}')

  # NFWFirewall depends on this resource. On Delete, CFN tears
  # children down before parents, so this Lambda runs first
  # and clears the operator-added routes that would otherwise
  # block firewall deletion.
  RouteCleanup:
    Type: Custom::RouteCleanup
    DependsOn:
      - NFWEndpointResolver
    Properties:
      ServiceToken: !GetAtt RouteCleanupLambda.Arn
      VpcId: !Ref InspectionVPC
      EndpointIdAZ1: !GetAtt NFWEndpointResolver.EndpointIdAZ1
      EndpointIdAZ2: !GetAtt NFWEndpointResolver.EndpointIdAZ2

  # ============================================================
  # Lambda - Generate a one-shot RSA keypair used to wire up
  # passwordless SSH between the three workload EC2s.
  #
  # On Create: ec2:CreateKeyPair returns the PEM-encoded private
  # key in 'KeyMaterial'; describe_key_pairs(IncludePublicKey=True)
  # returns the matching OpenSSH-format public key. Both are
  # returned as Data so the workload EC2 UserData can embed them
  # via Fn::Sub. The KeyPair is also stored in EC2 so that on
  # stack delete we can clean it up.
  # On Delete: the KeyPair gets removed.
  # ============================================================
  SshMeshKeyGenLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ssh-mesh-keygen'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt ResolverLambdaRole.Arn
      Code:
        ZipFile: |
          import json, boto3, urllib3, traceback
          http = urllib3.PoolManager()
          def send(event, context, status, data=None, reason=None, physical_id=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See log stream {context.log_stream_name}',
                  'PhysicalResourceId': physical_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'NoEcho': True,
                  'Data': data or {}
              })
              http.request('PUT', event['ResponseURL'], body=body,
                           headers={'Content-Type': 'application/json'})
          def handler(event, context):
              # Avoid logging private key material; print the request
              # type and resource properties only.
              print('RequestType', event.get('RequestType'),
                    'LogicalResourceId', event.get('LogicalResourceId'))
              ec2 = boto3.client('ec2')
              key_name = event['ResourceProperties']['KeyName']
              try:
                  if event['RequestType'] == 'Delete':
                      try:
                          ec2.delete_key_pair(KeyName=key_name)
                      except Exception as ex:
                          print(f'delete_key_pair ignored: {ex}')
                      send(event, context, 'SUCCESS', physical_id=key_name)
                      return
                  if event['RequestType'] == 'Update':
                      # Reuse existing key on update to avoid
                      # rotating credentials underneath running EC2s.
                      send(event, context, 'SUCCESS',
                           {'KeyName': key_name},
                           physical_id=key_name)
                      return
                  # Create: generate a fresh RSA keypair.
                  # If a leftover with the same name exists (rare,
                  # only on retried creates) drop it first.
                  try:
                      ec2.delete_key_pair(KeyName=key_name)
                  except Exception:
                      pass
                  resp = ec2.create_key_pair(
                      KeyName=key_name, KeyType='rsa', KeyFormat='pem')
                  private_key = resp['KeyMaterial']
                  desc = ec2.describe_key_pairs(
                      KeyNames=[key_name], IncludePublicKey=True)
                  public_key = desc['KeyPairs'][0]['PublicKey']
                  send(event, context, 'SUCCESS',
                       {'KeyName': key_name,
                        'PrivateKey': private_key,
                        'PublicKey': public_key},
                       physical_id=key_name)
              except Exception as e:
                  traceback.print_exc()
                  send(event, context, 'FAILED', reason=str(e),
                       physical_id=key_name)

  SshMeshKeyGen:
    Type: Custom::SshMeshKeyGen
    Properties:
      ServiceToken: !GetAtt SshMeshKeyGenLambda.Arn
      KeyName: !Sub '${AWS::StackName}-ssh-mesh'


  # ============================================================
  # Inspection VPC route tables - Firewall subnets
  #
  # These route tables enable VGW route propagation. The on-prem
  # prefixes (10.0.0.0/8 + 10.132.66.0/24) advertised by FRR over
  # BGP arrive here as VGW-propagated routes, so the firewall
  # subnet automatically forwards inspected traffic onward to the
  # VGW. No static on-prem route is needed here.
  # ============================================================
  FirewallRouteTableAZ1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref InspectionVPC
      Tags:
        - Key: Name
          Value: fw-rt-az1

  FirewallRoutePropagationAZ1:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VGWAttachment
    Properties:
      RouteTableIds:
        - !Ref FirewallRouteTableAZ1
      VpnGatewayId: !Ref VGW

  FirewallSubnetRouteTableAssociationAZ1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FirewallSubnetAZ1
      RouteTableId: !Ref FirewallRouteTableAZ1

  FirewallRouteTableAZ2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref InspectionVPC
      Tags:
        - Key: Name
          Value: fw-rt-az2

  FirewallRoutePropagationAZ2:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VGWAttachment
    Properties:
      RouteTableIds:
        - !Ref FirewallRouteTableAZ2
      VpnGatewayId: !Ref VGW

  FirewallSubnetRouteTableAssociationAZ2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FirewallSubnetAZ2
      RouteTableId: !Ref FirewallRouteTableAZ2

  # ============================================================
  # Inspection VPC route tables - Private workload subnets
  #
  # Default state: VGW route propagation is ENABLED, so on-prem
  # prefixes (10.0.0.0/8 + 10.132.66.0/24) advertised by FRR over
  # BGP appear here as VGW-targeted routes and traffic flows
  # directly through the VGW, BYPASSING NFW. This is intentional:
  # the experiment first validates a fully working BGP path with
  # NFW idle, then the operator manually steers traffic through
  # NFW by adding static, longest-prefix routes that override the
  # propagated routes:
  #   prv-rt-az1: 10.132.66.0/24 -> NFW endpoint AZ1
  #   prv-rt-az2: 10.132.66.0/24 -> NFW endpoint AZ2
  # Static /24 wins over propagated /8 by longest prefix; for the
  # exact /24 advertised by BGP, longest-prefix is a tie so AWS
  # prefers the static route over the propagated one.
  # ============================================================
  PrivateRouteTableAZ1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref InspectionVPC
      Tags:
        - Key: Name
          Value: prv-rt-az1

  PrivateRoutePropagationAZ1:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VGWAttachment
    Properties:
      RouteTableIds:
        - !Ref PrivateRouteTableAZ1
      VpnGatewayId: !Ref VGW

  PrivateSubnetRouteTableAssociationAZ1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetAZ1
      RouteTableId: !Ref PrivateRouteTableAZ1

  PrivateRouteTableAZ2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref InspectionVPC
      Tags:
        - Key: Name
          Value: prv-rt-az2

  PrivateRoutePropagationAZ2:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VGWAttachment
    Properties:
      RouteTableIds:
        - !Ref PrivateRouteTableAZ2
      VpnGatewayId: !Ref VGW

  PrivateSubnetRouteTableAssociationAZ2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetAZ2
      RouteTableId: !Ref PrivateRouteTableAZ2

  # ============================================================
  # Inspection VPC route table - VGW ingress (edge association)
  #
  # The route table itself and the edge association are created
  # but no per-/24 routes are added. To switch ingress traffic
  # through NFW, add in the console:
  #   10.87.114.0/24 -> NFW endpoint AZ1
  #   10.87.113.0/24 -> NFW endpoint AZ2
  # Without these, VGW ingress hits the local VPC route and
  # bypasses NFW.
  # ============================================================
  VGWIngressRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref InspectionVPC
      Tags:
        - Key: Name
          Value: vgw-ingress-rt

  VGWIngressEdgeAssociation:
    Type: AWS::EC2::GatewayRouteTableAssociation
    DependsOn: VGWAttachment
    Properties:
      GatewayId: !Ref VGW
      RouteTableId: !Ref VGWIngressRouteTable


