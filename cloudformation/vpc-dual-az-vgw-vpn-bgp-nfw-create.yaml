  # ============================================================
  # strongSwan + FRR EC2 - simulated Customer Gateway device
  # Two IPSec tunnels to AWS VGW with BGP advertising the on-prem
  # workload subnet (10.99.10.0/24).
  # ============================================================
  StrongSwanInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - StrongSwanEIPAssoc
    Properties:
      InstanceType: t4g.small
      ImageId: !Ref LatestUbuntuArmAmiId
      KeyName: !Ref KeyPairName
      SourceDestCheck: false
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref StrongSwanENI
          DeviceIndex: 0
      Tags:
        - Key: Name
          Value: StrongSwan + FRR CGW
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y strongswan frr frr-pythontools iproute2

            # Detect primary interface (Nitro names vary: enX0, ens5, eth0, ...)
            PRIMARY_IF=$(ip -o -4 route show to default | awk '{print $5}' | head -1)
            LOCAL_PRIV=$(ip -o -4 addr show dev "${!PRIMARY_IF}" | awk '{print $4}' | cut -d/ -f1)
            echo "primary_if=${!PRIMARY_IF} local_priv=${!LOCAL_PRIV}"

            # IP forwarding + relaxed rp_filter for VTI traffic
            cat >/etc/sysctl.d/99-vpn-router.conf <<EOF
            net.ipv4.ip_forward=1
            net.ipv4.conf.all.accept_redirects=0
            net.ipv4.conf.all.send_redirects=0
            net.ipv4.conf.all.rp_filter=0
            net.ipv4.conf.default.rp_filter=0
            EOF
            sysctl --system

            # ==============================
            # strongSwan - dual VTI route-based tunnels (active/passive).
            # Both AWS tunnels are brought UP so the S2S VPN console shows
            # 2/2 tunnels UP. Tunnel1 is primary, Tunnel2 is the standby
            # path (BGP attributes below steer traffic onto Tunnel1 and
            # fail over to Tunnel2 only when Tunnel1 drops).
            #
            # Each tunnel MUST stay isolated on three keys so the kernel
            # never picks the wrong SA for a marked packet:
            #   Tunnel1 -> reqid 1 / fwmark 0x64 (100) / vti key 100
            #   Tunnel2 -> reqid 2 / fwmark 0xc8 (200) / vti key 200
            # reqid is pinned explicitly in each conn so the SA reqid is
            # deterministic and matches the manual xfrm policies below.
            #
            # Algorithms: IKEv2 + AES-256 + SHA-256 + DH group 14, well
            # within AWS S2S VPN default Phase 1/2 proposal lists.
            # ==============================
            cat >/etc/ipsec.conf <<EOF
            config setup
                charondebug="ike 1, knl 1, cfg 0"
                uniqueids=no

            conn AWS-VPN-Tunnel1
                left=%defaultroute
                leftid=${StrongSwanEIPRef}
                leftsubnet=0.0.0.0/0
                right=${T1OutsideVgw}
                rightid=${T1OutsideVgw}
                rightsubnet=0.0.0.0/0
                authby=psk
                keyexchange=ikev2
                ike=aes256-sha256-modp2048!
                esp=aes256-sha256-modp2048!
                ikelifetime=28800s
                lifetime=3600s
                dpddelay=10s
                dpdtimeout=30s
                dpdaction=restart
                type=tunnel
                installpolicy=no
                reqid=1
                mark=100
                keyingtries=%forever
                auto=start

            conn AWS-VPN-Tunnel2
                left=%defaultroute
                leftid=${StrongSwanEIPRef}
                leftsubnet=0.0.0.0/0
                right=${T2OutsideVgw}
                rightid=${T2OutsideVgw}
                rightsubnet=0.0.0.0/0
                authby=psk
                keyexchange=ikev2
                ike=aes256-sha256-modp2048!
                esp=aes256-sha256-modp2048!
                ikelifetime=28800s
                lifetime=3600s
                dpddelay=10s
                dpdtimeout=30s
                dpdaction=restart
                type=tunnel
                installpolicy=no
                reqid=2
                mark=200
                keyingtries=%forever
                auto=start
            EOF

            cat >/etc/ipsec.secrets <<EOF
            ${StrongSwanEIPRef} ${T1OutsideVgw} : PSK "${T1Psk}"
            ${StrongSwanEIPRef} ${T2OutsideVgw} : PSK "${T2Psk}"
            EOF
            chmod 600 /etc/ipsec.secrets

            # ==============================
            # iptables mangle - mark outbound traffic per VTI so it matches
            # the strongSwan outbound SA which is keyed by fwmark.
            #   vti1 -> 0x64 (100)  (Tunnel1, primary)
            #   vti2 -> 0xc8 (200)  (Tunnel2, standby)
            # Without these, kernel cannot find an SA and replies with EHOSTUNREACH.
            # ==============================
            cat >/etc/iptables-vti.rules <<'EOF'
            *mangle
            -A OUTPUT -o vti1 -j MARK --set-xmark 0x64/0xffffffff
            -A FORWARD -o vti1 -j MARK --set-xmark 0x64/0xffffffff
            -A OUTPUT -o vti2 -j MARK --set-xmark 0xc8/0xffffffff
            -A FORWARD -o vti2 -j MARK --set-xmark 0xc8/0xffffffff
            COMMIT
            EOF
            apt-get install -y iptables-persistent netfilter-persistent
            iptables -t mangle -A OUTPUT -o vti1 -j MARK --set-xmark 0x64/0xffffffff
            iptables -t mangle -A FORWARD -o vti1 -j MARK --set-xmark 0x64/0xffffffff
            iptables -t mangle -A OUTPUT -o vti2 -j MARK --set-xmark 0xc8/0xffffffff
            iptables -t mangle -A FORWARD -o vti2 -j MARK --set-xmark 0xc8/0xffffffff

            # ==============================
            # iptables nat - SNAT (MASQUERADE) for two distinct egress
            # use cases:
            # 1) StrongSwan itself egressing to the internet for apt /
            #    boot tasks. Source matches the EC2's primary IP.
            # 2) IDC subnet 10.132.66.0/24 egressing to the internet
            #    after we set 0.0.0.0/0 -> StrongSwan in OnPremPrivateRT.
            #    Without SNAT the IGW drops the 10.132.66.x source.
            #
            # Filters:
            #   -o $PRIMARY_IF : only main NIC egress; vti1 (VPN to AWS)
            #                    is NEVER masqueraded, so the 10.132.66.x
            #                    -> 10.87.x.x flow keeps its real source
            #                    IP and NFW logs read true.
            #   ! -d 10.0.0.0/8: do not SNAT any traffic destined to the
            #                    on-prem secondary CIDR or the BGP-announced
            #                    range; transit flows stay symmetric.
            # ==============================
            iptables -t nat -A POSTROUTING -o "${!PRIMARY_IF}" \
                ! -d 10.0.0.0/8 -j MASQUERADE
            netfilter-persistent save || true

            # ==============================
            # VTI interface bring-up + xfrm policy + blackhole routes
            # 1) VTI1/VTI2 carry the BGP+IPSec traffic (route-based VPN).
            #    VTI1 = Tunnel1 (primary), VTI2 = Tunnel2 (standby).
            # 2) strongSwan in route-based mode does not install xfrm
            #    policies, so we install them here keyed by fwmark. Each
            #    tunnel uses its own reqid + mark so the kernel matches
            #    the right SA:
            #      vti1 -> reqid 1 / mark 0x64
            #      vti2 -> reqid 2 / mark 0xc8
            #    Without these, kernel finds no SA template and outbound
            #    traffic on the vti fails with EHOSTUNREACH.
            # 3) FRR will only advertise a 'network' prefix that has a
            #    matching kernel route. Add blackhole routes for the
            #    on-prem prefixes so BGP actually announces them.
            # ==============================
            cat >/usr/local/sbin/aws-vpn-vti.sh <<EOF
            #!/bin/bash
            set -e
            LOCAL=\$(ip -o -4 route show to default | awk '{print \$5}' | head -1)
            LOCAL_IP=\$(ip -o -4 addr show dev \$LOCAL | awk '{print \$4}' | cut -d/ -f1)

            # VTI1 (Tunnel1, primary)
            ip link add vti1 type vti local \$LOCAL_IP remote ${T1OutsideVgw} key 100 2>/dev/null || true
            ip addr add ${T1InsideCgw}/30 dev vti1 2>/dev/null || true
            ip link set vti1 mtu 1419 up
            sysctl -w net.ipv4.conf.vti1.disable_policy=1
            sysctl -w net.ipv4.conf.vti1.rp_filter=0

            # VTI2 (Tunnel2, standby)
            ip link add vti2 type vti local \$LOCAL_IP remote ${T2OutsideVgw} key 200 2>/dev/null || true
            ip addr add ${T2InsideCgw}/30 dev vti2 2>/dev/null || true
            ip link set vti2 mtu 1419 up
            sysctl -w net.ipv4.conf.vti2.disable_policy=1
            sysctl -w net.ipv4.conf.vti2.rp_filter=0

            # xfrm policies for Tunnel1 (reqid 1 / mark 0x64 = 100)
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir out \\
              tmpl src \$LOCAL_IP dst ${T1OutsideVgw} proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir in \\
              tmpl src ${T1OutsideVgw} dst \$LOCAL_IP proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir fwd \\
              tmpl src ${T1OutsideVgw} dst \$LOCAL_IP proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true

            # xfrm policies for Tunnel2 (reqid 2 / mark 0xc8 = 200)
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir out \\
              tmpl src \$LOCAL_IP dst ${T2OutsideVgw} proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir in \\
              tmpl src ${T2OutsideVgw} dst \$LOCAL_IP proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true
            ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir fwd \\
              tmpl src ${T2OutsideVgw} dst \$LOCAL_IP proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true

            # Blackhole routes so FRR advertises these prefixes via BGP
            ip route replace blackhole ${BgpAnnounceCidr} metric 250
            ip route replace blackhole ${OnPremInspectedCidr} metric 250

            # More specific kernel routes to actually forward inspected
            # subnet traffic into the on-prem VPC private subnet via the
            # subnet's default gateway (overrides the blackhole above).
            DEFGW=\$(ip -o -4 route show to default | awk '{print \$3}' | head -1)
            DEFIF=\$(ip -o -4 route show to default | awk '{print \$5}' | head -1)
            ip route replace ${OnPremInspectedCidr} via \$DEFGW dev \$DEFIF metric 50
            EOF
            chmod +x /usr/local/sbin/aws-vpn-vti.sh

            cat >/etc/systemd/system/aws-vpn-vti.service <<'EOF'
            [Unit]
            Description=AWS VPN VTI bring-up
            After=network-online.target strongswan-starter.service
            Wants=network-online.target strongswan-starter.service

            [Service]
            Type=oneshot
            ExecStart=/usr/local/sbin/aws-vpn-vti.sh
            RemainAfterExit=yes

            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl enable aws-vpn-vti.service

            # ==============================
            # FRR - dual BGP neighbors (active/passive) over both tunnels,
            # advertising the on-prem prefixes so AWS VGW propagates them.
            #
            # active/passive steering via BGP attributes:
            #  - Egress CGW->AWS: Tunnel1 neighbor gets a higher 'weight'
            #    (200 vs 100). Weight is Cisco-style, local to this router,
            #    highest wins, so CGW sends toward AWS over Tunnel1.
            #  - Ingress AWS->CGW: a route-map prepends our own ASN 3x on
            #    routes advertised out Tunnel2. The longer AS_PATH makes the
            #    AWS VGW prefer Tunnel1 for the return path. Tunnel2 is used
            #    only when Tunnel1's BGP session drops.
            # Both tunnels stay UP (auto=start on both conns) so the S2S
            # VPN console reports 2/2 tunnels UP.
            # ==============================
            sed -i 's/^bgpd=no/bgpd=yes/' /etc/frr/daemons
            cat >/etc/frr/frr.conf <<EOF
            frr version 8.4
            frr defaults traditional
            hostname strongswan-cgw
            no ipv6 forwarding
            !
            router bgp ${CustomerBgpAsnRef}
             bgp router-id ${T1InsideCgw}
             no bgp ebgp-requires-policy
             neighbor ${T1InsideVgw} remote-as ${AwsVgwAsnRef}
             neighbor ${T1InsideVgw} timers 10 30
             neighbor ${T1InsideVgw} weight 200
             neighbor ${T2InsideVgw} remote-as ${AwsVgwAsnRef}
             neighbor ${T2InsideVgw} timers 10 30
             neighbor ${T2InsideVgw} weight 100
             !
             address-family ipv4 unicast
              network ${BgpAnnounceCidr}
              network ${OnPremInspectedCidr}
              neighbor ${T1InsideVgw} activate
              neighbor ${T1InsideVgw} soft-reconfiguration inbound
              neighbor ${T2InsideVgw} activate
              neighbor ${T2InsideVgw} soft-reconfiguration inbound
              neighbor ${T2InsideVgw} route-map STANDBY-OUT out
             exit-address-family
            !
            ! Standby path: lengthen AS_PATH on Tunnel2 advertisements so
            ! the AWS VGW prefers Tunnel1 for the return traffic.
            route-map STANDBY-OUT permit 10
             set as-path prepend ${CustomerBgpAsnRef} ${CustomerBgpAsnRef} ${CustomerBgpAsnRef}
            !
            line vty
            !
            EOF

            systemctl enable strongswan-starter
            systemctl restart strongswan-starter
            sleep 5
            systemctl start aws-vpn-vti.service || true
            systemctl enable frr
            systemctl restart frr

            # Static safety-net routes (BGP will install more specific ones)
            ip route replace ${InspectionVpcCidr} dev vti1 metric 100 || true

            # ==============================
            # xfrm policy reaper - install the route-based xfrm policies
            # whenever they are missing. strongSwan re-keys SAs every
            # hour and that wipes the kernel xfrm policy table; this
            # keeps both route-based tunnels' data planes alive.
            #   Tunnel1 -> reqid 1 / mark 0x64
            #   Tunnel2 -> reqid 2 / mark 0xc8
            # ==============================
            cat >/usr/local/sbin/aws-vpn-xfrm-reinstall.sh <<EOF
            #!/bin/bash
            LOCAL_IF=\$(ip -o -4 route show to default | awk '{print \$5}' | head -1)
            LOCAL_IP=\$(ip -o -4 addr show dev \$LOCAL_IF | awk '{print \$4}' | cut -d/ -f1)
            REMOTE1=${T1OutsideVgw}
            REMOTE2=${T2OutsideVgw}
            if ! ip xfrm policy show | grep -q "mark 0x64"; then
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir out \\
                tmpl src \$LOCAL_IP dst \$REMOTE1 proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir in \\
                tmpl src \$REMOTE1 dst \$LOCAL_IP proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir fwd \\
                tmpl src \$REMOTE1 dst \$LOCAL_IP proto esp reqid 1 mode tunnel mark 0x64 2>/dev/null || true
              logger "aws-vpn: Tunnel1 xfrm policies (re)installed"
            fi
            if ! ip xfrm policy show | grep -q "mark 0xc8"; then
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir out \\
                tmpl src \$LOCAL_IP dst \$REMOTE2 proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir in \\
                tmpl src \$REMOTE2 dst \$LOCAL_IP proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true
              ip xfrm policy add src 0.0.0.0/0 dst 0.0.0.0/0 dir fwd \\
                tmpl src \$REMOTE2 dst \$LOCAL_IP proto esp reqid 2 mode tunnel mark 0xc8 2>/dev/null || true
              logger "aws-vpn: Tunnel2 xfrm policies (re)installed"
            fi
            EOF
            chmod +x /usr/local/sbin/aws-vpn-xfrm-reinstall.sh

            cat >/etc/systemd/system/aws-vpn-xfrm-reinstall.service <<'EOF'
            [Unit]
            Description=Re-install AWS VPN route-based xfrm policies if missing
            [Service]
            Type=oneshot
            ExecStart=/usr/local/sbin/aws-vpn-xfrm-reinstall.sh
            EOF

            cat >/etc/systemd/system/aws-vpn-xfrm-reinstall.timer <<'EOF'
            [Unit]
            Description=Periodically check AWS VPN xfrm policies
            [Timer]
            OnBootSec=30s
            OnUnitActiveSec=60s
            Unit=aws-vpn-xfrm-reinstall.service
            [Install]
            WantedBy=timers.target
            EOF
            systemctl daemon-reload
            systemctl enable --now aws-vpn-xfrm-reinstall.timer

            # Give BGP a moment then nudge both sessions so advertised
            # routes are recomputed against the freshly-installed
            # blackhole kernel routes.
            sleep 15
            vtysh -c "clear ip bgp ${T1InsideVgw} soft out" || true
            vtysh -c "clear ip bgp ${T2InsideVgw} soft out" || true

            echo "strongSwan + FRR bootstrap finished" > /var/log/cgw-bootstrap.done
          - StrongSwanEIPRef: !Ref StrongSwanEIP
            T1OutsideVgw: !GetAtt VPNInfoResolver.Tunnel1OutsideVgw
            T1InsideCgw: !GetAtt VPNInfoResolver.Tunnel1InsideCgw
            T1InsideVgw: !GetAtt VPNInfoResolver.Tunnel1InsideVgw
            T1Psk: !Ref Tunnel1PreSharedKey
            T2OutsideVgw: !GetAtt VPNInfoResolver.Tunnel2OutsideVgw
            T2InsideCgw: !GetAtt VPNInfoResolver.Tunnel2InsideCgw
            T2InsideVgw: !GetAtt VPNInfoResolver.Tunnel2InsideVgw
            T2Psk: !Ref Tunnel2PreSharedKey
            CustomerBgpAsnRef: !Ref CustomerBgpAsn
            AwsVgwAsnRef: !Ref AwsVgwBgpAsn
            BgpAnnounceCidr: !FindInMap [Cidr, OnPremVpc, BgpAnnounce]
            OnPremInspectedCidr: !FindInMap [Cidr, OnPremVpc, PrivateSubnet]
            InspectionVpcCidr: !FindInMap [Cidr, InspectionVpc, Vpc]


  # ============================================================
  # Workload EC2 instances - inspection VPC (private subnets)
  #
  # Each instance gets:
  #   1) A Python http.server serving /var/www/index.html on :80,
  #      labelled with its role so curl from elsewhere identifies
  #      which EC2 answered.
  #   2) Passwordless SSH mesh: a one-shot RSA keypair generated
  #      by SshMeshKeyGen is written to /home/ubuntu/.ssh, and
  #      ssh_config disables strict host key checking on the
  #      private 10/8 ranges so 'ssh ubuntu@<peer-ip>' just works.
  #   3) Best-effort apt + snap installs of mtr/iperf3/tcpdump
  #      and amazon-ssm-agent. These depend on internet egress
  #      (which only works after VPN/BGP is up and StrongSwan
  #      SNAT is in place) so they are wrapped in '|| true'.
  # ============================================================
  WorkloadInspectionAZ1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.micro
      ImageId: !Ref LatestUbuntuArmAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PrivateSubnetAZ1
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      SecurityGroupIds:
        - !Ref WorkloadSGInspection
      Tags:
        - Key: Name
          Value: Workload AZ1 (inspection)
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -eux
            export DEBIAN_FRONTEND=noninteractive

            # === SSH mesh: passwordless SSH between workload EC2s ===
            mkdir -p /home/ubuntu/.ssh
            cat >/home/ubuntu/.ssh/id_rsa <<'PRIV_EOF'
            ${SshPrivateKey}
            PRIV_EOF
            cat >/home/ubuntu/.ssh/id_rsa.pub <<'PUB_EOF'
            ${SshPublicKey}
            PUB_EOF
            touch /home/ubuntu/.ssh/authorized_keys
            grep -qxF "${SshPublicKey}" /home/ubuntu/.ssh/authorized_keys \
              || cat /home/ubuntu/.ssh/id_rsa.pub >> /home/ubuntu/.ssh/authorized_keys
            cat >/home/ubuntu/.ssh/config <<'CFG_EOF'
            Host 10.87.* 10.132.* 10.0.*
                User ubuntu
                IdentityFile ~/.ssh/id_rsa
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
            CFG_EOF
            chmod 700 /home/ubuntu/.ssh
            chmod 600 /home/ubuntu/.ssh/id_rsa /home/ubuntu/.ssh/authorized_keys /home/ubuntu/.ssh/config
            chmod 644 /home/ubuntu/.ssh/id_rsa.pub
            chown -R ubuntu:ubuntu /home/ubuntu/.ssh

            # === Web service: Python http.server on :80 ===
            mkdir -p /var/www
            PRIMARY_IF=$(ip -o -4 route show to default | awk '{print $5}' | head -1)
            PRIVATE_IP=$(ip -o -4 addr show dev "${!PRIMARY_IF}" | awk '{print $4}' | cut -d/ -f1)
            HOSTNAME_VAL=$(hostname)
            cat >/var/www/index.html <<HTML
            <!doctype html>
            <html><head><meta charset="utf-8"><title>${ServerLabel}</title></head>
            <body style="font-family:sans-serif;">
            <h1>This is ${ServerLabel}</h1>
            <p><b>Role:</b> ${ServerRole}</p>
            <p><b>Hostname:</b> ${!HOSTNAME_VAL}</p>
            <p><b>Private IP:</b> ${!PRIVATE_IP}</p>
            </body></html>
            HTML

            cat >/etc/systemd/system/workload-http.service <<'SVC_EOF'
            [Unit]
            Description=Workload HTTP server (Python http.server on :80)
            After=network-online.target
            [Service]
            ExecStart=/usr/bin/python3 -m http.server 80 --directory /var/www
            Restart=always
            [Install]
            WantedBy=multi-user.target
            SVC_EOF
            systemctl daemon-reload
            systemctl enable --now workload-http.service

            # === Best-effort tooling install (needs VPN + SNAT egress) ===
            (apt-get update && apt-get install -y mtr-tiny iperf3 tcpdump traceroute net-tools dnsutils) || true
            snap install amazon-ssm-agent --classic || true
            systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service \
              || systemctl enable --now amazon-ssm-agent || true

            cat >/etc/systemd/system/iperf3-server.service <<'IPS_EOF'
            [Unit]
            Description=iperf3 server
            After=network-online.target
            [Service]
            ExecStart=/usr/bin/iperf3 -s
            Restart=always
            [Install]
            WantedBy=multi-user.target
            IPS_EOF
            systemctl daemon-reload
            systemctl enable iperf3-server || true
            systemctl start iperf3-server || true
          - SshPrivateKey: !GetAtt SshMeshKeyGen.PrivateKey
            SshPublicKey: !GetAtt SshMeshKeyGen.PublicKey
            ServerLabel: 'Workload AZ1 server'
            ServerRole: 'inspection VPC, AZ1 (10.87.114.0/24)'

  WorkloadInspectionAZ2:
    Type: AWS::EC2::Instance
    Properties:
