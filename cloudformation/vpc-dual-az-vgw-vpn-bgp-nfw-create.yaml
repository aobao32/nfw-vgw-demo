            # === Best-effort tooling install (needs VPN + SNAT egress) ===
            (apt-get update && apt-get install -y mtr-tiny iperf3 tcpdump traceroute net-tools dnsutils) || true
            snap install amazon-ssm-agent --classic || true
            systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service \
              || systemctl enable --now amazon-ssm-agent || true

            cat >/etc/systemd/system/iperf3-server.service <<'IPS_EOF'
            [Unit]
