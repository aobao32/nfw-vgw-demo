          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: Workload SG (inspection)

  WorkloadSGOnPrem:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Workload SG (onprem VPC)
      VpcId: !Ref OnPremVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref EICSecurityGroupOnPrem
          Description: SSH from EIC
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: !FindInMap [Cidr, InspectionVpc, Vpc]
          Description: ICMP from inspection VPC (ping testing)
        - IpProtocol: -1
          CidrIp: !FindInMap [Cidr, InspectionVpc, Vpc]
          Description: Allow all from inspection VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: Workload SG (onprem)

  StrongSwanSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: strongSwan + FRR Customer Gateway device SG
      VpcId: !Ref OnPremVPC
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 500
          ToPort: 500
          CidrIp: 0.0.0.0/0
          Description: IKE
        - IpProtocol: udp
          FromPort: 4500
          ToPort: 4500
          CidrIp: 0.0.0.0/0
          Description: IPSec NAT-T
        - IpProtocol: 50
          CidrIp: 0.0.0.0/0
          Description: ESP
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref EICSecurityGroupOnPrem
          Description: SSH from EIC
        - IpProtocol: -1
          CidrIp: !FindInMap [Cidr, OnPremVpc, Vpc]
          Description: All from onprem VPC
        - IpProtocol: -1
          CidrIp: !FindInMap [Cidr, OnPremVpc, VpcSecondary]
