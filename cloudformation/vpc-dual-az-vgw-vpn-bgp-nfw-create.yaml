            PRIMARY_IF=$(ip -o -4 route show to default | awk '{print $5}' | head -1)
            PRIVATE_IP=$(ip -o -4 addr show dev "${!PRIMARY_IF}" | awk '{print $4}' | cut -d/ -f1)
            HOSTNAME_VAL=$(hostname)
            cat >/var/www/index.html <<HTML
            <!doctype html>
            <html><head><meta charset="utf-8"><title>${ServerLabel}</title></head>
            <body style="font-family:sans-serif;">
            <h1>This is ${ServerLabel}</h1>
            <p><b>Role:</b> ${ServerRole}</p>
            <p><b>Hostname:</b> ${!HOSTNAME_VAL}</p>
            <p><b>Private IP:</b> ${!PRIVATE_IP}</p>
            </body></html>
            HTML

            cat >/etc/systemd/system/workload-http.service <<'SVC_EOF'
            [Unit]
            Description=Workload HTTP server (Python http.server on :80)
            After=network-online.target
            [Service]
            ExecStart=/usr/bin/python3 -m http.server 80 --directory /var/www
            Restart=always
            [Install]
            WantedBy=multi-user.target
            SVC_EOF
            systemctl daemon-reload
            systemctl enable --now workload-http.service

            # === Best-effort tooling install (needs VPN + SNAT egress) ===
            (apt-get update && apt-get install -y mtr-tiny iperf3 tcpdump traceroute net-tools dnsutils) || true
            snap install amazon-ssm-agent --classic || true
            systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service \
              || systemctl enable --now amazon-ssm-agent || true

            cat >/etc/systemd/system/iperf3-server.service <<'IPS_EOF'
            [Unit]
            Description=iperf3 server
            After=network-online.target
            [Service]
            ExecStart=/usr/bin/iperf3 -s
            Restart=always
            [Install]
            WantedBy=multi-user.target
            IPS_EOF
            systemctl daemon-reload
            systemctl enable iperf3-server || true
            systemctl start iperf3-server || true
          - SshPrivateKey: !GetAtt SshMeshKeyGen.PrivateKey
            SshPublicKey: !GetAtt SshMeshKeyGen.PublicKey
            ServerLabel: 'Workload OnPrem server'
            ServerRole: 'simulated IDC, 10.132.66.0/24'

Outputs:
  InspectionVPCId:
    Description: Inspection VPC ID
    Value: !Ref InspectionVPC

  InspectionVpcCidr:
    Description: Inspection VPC CIDR
    Value: !FindInMap [Cidr, InspectionVpc, Vpc]

  OnPremVPCId:
    Description: Simulated on-prem VPC ID
    Value: !Ref OnPremVPC

  OnPremVpcCidr:
    Description: Simulated on-prem VPC CIDR
    Value: !FindInMap [Cidr, OnPremVpc, Vpc]

  OnPremPrivateSubnetCidr:
    Description: On-prem workload subnet (advertised by BGP)
    Value: !FindInMap [Cidr, OnPremVpc, PrivateSubnet]

  VGWId:
    Description: Virtual Private Gateway ID
    Value: !Ref VGW

  VPNConnectionId:
    Description: Site-to-Site VPN connection ID (DX simulator)
    Value: !Ref VPNConnection

  CustomerGatewayId:
    Description: Customer Gateway ID (points at strongSwan EIP)
    Value: !Ref CustomerGateway

  StrongSwanEIP:
    Description: Public IP of the strongSwan + FRR Customer Gateway
    Value: !Ref StrongSwanEIP

  StrongSwanInstanceId:
    Description: EC2 ID of the strongSwan + FRR Customer Gateway
    Value: !Ref StrongSwanInstance

  NFWFirewallArn:
    Description: Network Firewall ARN
    Value: !Ref NFWFirewall

  NFWEndpointAZ1:
    Description: NFW VPC endpoint in AZ1
    Value: !GetAtt NFWEndpointResolver.EndpointIdAZ1

  NFWEndpointAZ2:
    Description: NFW VPC endpoint in AZ2
    Value: !GetAtt NFWEndpointResolver.EndpointIdAZ2

  Tunnel1OutsideVgwIp:
    Description: AWS-side public IP of VPN tunnel 1
    Value: !GetAtt VPNInfoResolver.Tunnel1OutsideVgw

  Tunnel2OutsideVgwIp:
    Description: AWS-side public IP of VPN tunnel 2
    Value: !GetAtt VPNInfoResolver.Tunnel2OutsideVgw

  Tunnel1InsideCgwIp:
    Description: CGW-side inside IP for tunnel 1 (BGP local)
    Value: !GetAtt VPNInfoResolver.Tunnel1InsideCgw

  Tunnel1InsideVgwIp:
    Description: VGW-side inside IP for tunnel 1 (BGP peer)
    Value: !GetAtt VPNInfoResolver.Tunnel1InsideVgw

  Tunnel2InsideCgwIp:
    Description: CGW-side inside IP for tunnel 2
    Value: !GetAtt VPNInfoResolver.Tunnel2InsideCgw

  Tunnel2InsideVgwIp:
    Description: VGW-side inside IP for tunnel 2
    Value: !GetAtt VPNInfoResolver.Tunnel2InsideVgw

  WorkloadInspectionAZ1Id:
    Description: Inspection-VPC workload EC2 in AZ1
    Value: !Ref WorkloadInspectionAZ1

  WorkloadInspectionAZ2Id:
    Description: Inspection-VPC workload EC2 in AZ2
    Value: !Ref WorkloadInspectionAZ2

  WorkloadOnPremId:
    Description: Simulated on-prem workload EC2
    Value: !Ref WorkloadOnPrem

  EICEndpointInspectionId:
    Description: EIC endpoint in inspection VPC
    Value: !Ref EICEndpointInspection

  EICEndpointOnPremId:
    Description: EIC endpoint in on-prem VPC
    Value: !Ref EICEndpointOnPrem
