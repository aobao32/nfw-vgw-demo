        - IpProtocol: -1
          CidrIp: !FindInMap [Cidr, OnPremVpc, BgpAnnounce]
          Description: Allow all from simulated on-prem (10.0.0.0/8)
        - IpProtocol: -1
          CidrIp: !FindInMap [Cidr, OnPremVpc, PrivateSubnet]
          Description: Allow all from inspected on-prem subnet
      SecurityGroupEgress:
